version: "3.8"

services:
  content-api:
    build: .
    container_name: medicaltourismchina-content-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-8787}
    ports:
      - "127.0.0.1:${PORT:-8787}:${PORT:-8787}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${PORT:-8787}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
